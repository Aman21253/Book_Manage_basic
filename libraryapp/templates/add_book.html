{% extends 'base.html' %}

{% block title %}Add Book{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Add Book</h2>
    </div>
    <div class="card-body">

        {% if messages %}
            {% for message in messages %}
                <div style="
                    margin-bottom: 15px;
                    padding: 12px;
                    border-radius: 6px;
                    color: white;
                    background-color: {% if message.tags == 'success' %}#16a34a{% else %}#dc2626{% endif %};
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" name="title" placeholder="Enter title" required>
                </div>
                <div class="form-group">
                    <label>Author *</label>
                    <input type="text" name="author" placeholder="Enter author" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>ISBN *</label>
                    <input
                        type="text"
                        name="isbn"
                        placeholder="Enter ISBN"
                        pattern="\d{10}|\d{13}"
                        title="ISBN must be 10 or 13 digits"
                        required
                    >
                </div>
                <div class="form-group">
                    <label>Price *</label>
                    <input type="text" name="price" placeholder="Enter price" required>
                </div>
                <div class="form-group">
                    <label>Pages</label>
                    <input type="number" name="pages" placeholder="Enter pages" min="0">
                </div>
                <div class="form-group">
                    <label>Quantity *</label>
                    <input type="number" name="quantity" placeholder="Enter quantity" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>About the book *</label>
                    <textarea name="description" placeholder="Enter about" required></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-success">Submit</button>
                <button type="reset" class="btn btn-secondary">Cancel</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
